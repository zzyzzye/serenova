# ═══════════════════════════════════════════════════════
# OpenSpec 团队标准配置模板
# 版本：v1.0.0
# 使用方式：openspec init 后，将此文件内容复制到 openspec/config.yaml
# ═══════════════════════════════════════════════════════

schema: spec-driven

context: |
  语言：中文（简体）
  所有产出物（proposal / specs / design / tasks）必须用简体中文撰写。
  技术栈: fastapi、vue3、mysql、redis
  API 风格: RESTful
  测试框架: 
  部署环境: Docker

rules:
  proposal:
    - 必须包含回滚计划
    - 明确"非目标（Non-Goals）"防止 AI 过度设计
    - 列出影响范围（涉及哪些模块、服务）
  specs:
    - 使用 Given/When/Then 格式编写验收场景
    - 在发明新模式之前引用现有模式
    - 边界条件和异常场景必须覆盖
  design:
    - 记录架构决策的"为什么"（ADR 风格）
    - 列出新建文件和修改文件清单
    - 涉及数据库变更时必须说明索引策略和迁移方案
  tasks:
    - 每个任务粒度约等于一次 git commit
    - 标注任务间的依赖关系
    - 涉及数据库迁移的任务必须排在最前